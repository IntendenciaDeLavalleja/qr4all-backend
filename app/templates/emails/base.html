<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{ subject | default(app_name) }}</title>
</head>
<body style="margin:0;padding:0;background-color:#F0F2F5;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">

  <!-- Outer wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="background-color:#F0F2F5;padding:40px 20px;">
    <tr>
      <td align="center">

        <!-- Main card -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="max-width:560px;width:100%;border-radius:16px;overflow:hidden;background-color:#FFFFFF;box-shadow:0 2px 12px rgba(0,0,0,0.06);">

          <!-- ── Header ─────────────────────────────────────────── -->
          <tr>
            <td style="background-color:#021A54;padding:32px 36px 28px;text-align:center;">
              <!-- Accent bar -->
              <div style="width:48px;height:3px;background-color:#2F65B8;border-radius:2px;margin:0 auto 16px;"></div>

              <!-- App name -->
              <div style="font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:24px;font-weight:800;color:#FFFFFF;letter-spacing:0.01em;line-height:1.2;margin-bottom:6px;">
                {{ app_name | default("QR4All Lavalleja") }}
              </div>

              <!-- Subtitle -->
              <div style="font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;font-weight:500;color:#C8D6F0;letter-spacing:0.06em;text-transform:uppercase;">
                {{ subtitle | default("QR, enlaces cortos y analítica") }}
              </div>
            </td>
          </tr>

          <!-- ── Content block ─────────────────────────────────── -->
          <tr>
            <td style="background-color:#FFFFFF;padding:36px 36px 28px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- ── Footer ────────────────────────────────────────── -->
          <tr>
            <td style="background-color:#F8F9FA;border-top:1px solid #E5E7EB;padding:20px 36px;text-align:center;">
              <p style="font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#64748B;margin:0 0 4px;">
                {{ app_name | default("QR4All Lavalleja") }} · Intendencia Departamental de Lavalleja
              </p>
              <p style="font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:11px;color:#94A3B8;margin:0;">
                Este es un correo automático. Por favor, no respondas a este mensaje.
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
