<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pagina No Encontrada</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.14), transparent 30%),
        #eef2f7;
      color: #1e1b4b;
    }
    .card {
      width: min(100%, 560px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      padding: 40px 32px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 22px;
    }
    h1 {
      font-size: clamp(30px, 4vw, 40px);
      line-height: 1.05;
      margin-bottom: 14px;
    }
    p {
      font-size: 15px;
      line-height: 1.7;
      color: #64748b;
      max-width: 420px;
      margin: 0 auto;
    }
    .code {
      display: inline-block;
      margin-top: 24px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">QR4All Lavalleja</div>
    <h1>Pagina No Encontrada</h1>
    <p>
      La pagina que intentaste abrir no esta disponible.
      Si llegaste aqui manualmente, esa ruta no es publica.
    </p>
    <div class="code">404 Not Found</div>
  </main>
</body>
</html>
